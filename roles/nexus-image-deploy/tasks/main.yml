- name: Create nexus directory
  file:
    path: /opt/nexus-data
    state: directory
    owner: 200
    group: 200
    mode: '0755'

- name: Nexus docker deploy
  community.docker.docker_container:
    name: nexus
    image: sonatype/nexus3:latest
    state: started
    restart_policy: always
    published_ports:
      - "8081:8081"
    volumes:
      - /opt/nexus-data:/nexus-data